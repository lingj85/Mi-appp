<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<title>Barbería Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:black;
    color:white;
}
header {
    text-align:center;
    padding:15px;
    color:gold;
}
button {
    background:gold;
    border:none;
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<header>💈 Barbería Premium APP</header>

<h2 style="text-align:center;">Sistema listo</h2>

<button onclick="installApp()">📲 Instalar App</button>

<script>
// SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// BOTON INSTALAR
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
});

function installApp() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
    } else {
        alert("Usa Chrome → menú → 'Instalar app'");
    }
}
</script>

</body>
</html>
